<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Start</title>
    <style>
        :root {
            /* Apple-inspired "Broken White" Palette */
            --bg-color: #F5F5F7;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --accent-color: #0071E3;
            --card-bg: #FFFFFF;
            --input-bg: #FFFFFF;
            --border-color: rgba(0,0,0,0.05);
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-primary: #F5F5F7;
                --text-secondary: #A1A1A6;
                --accent-color: #0071E3;
                --card-bg: #1C1C1E;
                --input-bg: #1C1C1E;
                --border-color: rgba(255,255,255,0.1);
            }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            z-index: 1;
        }

        .time {
            font-size: 7rem;
            font-weight: 700;
            letter-spacing: -3px;
            margin-bottom: 0px;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 60px;
        }

        .search-input {
            width: 100%;
            padding: 18px 28px;
            font-size: 1.1rem;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background-color: var(--input-bg);
            color: var(--text-primary);
            outline: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            text-align: center;
        }

        .search-input:focus {
            transform: scale(1.02);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            border-color: var(--accent-color);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 24px 16px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
        }

        .stat-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--accent-color);
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .greeting {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        /* Subtle background decoration */
        .bg-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 113, 227, 0.05) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(60px);
        }
    </style>
</head>

<body>
    <div class="bg-blob" style="top: -200px; right: -200px;"></div>
    <div class="bg-blob" style="bottom: -200px; left: -200px;"></div>

    <div class="greeting" id="greeting">GOOD MORNING</div>

    <div class="container">
        <div class="time" id="clock">00:00</div>
        <div class="date" id="date">MONDAY, JANUARY 1</div>

        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Where to next?" autofocus>
        </div>

        <div class="stats-grid">
            <div class="stat-card" id="card-score">
                <div class="stat-value">--</div>
                <div class="stat-label">Focus Score</div>
            </div>
            <div class="stat-card" id="card-pomodoros">
                <div class="stat-value">--</div>
                <div class="stat-label">Pomodoros</div>
            </div>
            <div class="stat-card" id="card-minutes">
                <div class="stat-value">--</div>
                <div class="stat-label">Minutes</div>
            </div>
            <div class="stat-card" id="card-blocked">
                <div class="stat-value">--</div>
                <div class="stat-label">Blocked</div>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, options).toUpperCase();

            const hr = now.getHours();
            let greet = "WELCOME";
            if (hr < 12) greet = "GOOD MORNING";
            else if (hr < 18) greet = "GOOD AFTERNOON";
            else greet = "GOOD EVENING";
            document.getElementById('greeting').textContent = greet;
        }

        setInterval(updateTime, 1000);
        updateTime();

        // Search functionality
        const input = document.getElementById('searchInput');
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = input.value.trim();
                if (query) {
                    if (query.startsWith('http')) {
                        window.location.href = query;
                    } else if (query.includes('.') && !query.includes(' ')) {
                        window.location.href = 'https://' + query;
                    } else {
                        window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
                    }
                }
            }
        });

        // Native Bridge
        window.updateStats = function (data) {
            if (!data) return;

            if (data.score !== undefined) {
                document.querySelector('#card-score .stat-value').textContent = Math.round(data.score);
                document.querySelector('#card-score').title = data.scoreDescription || '';
            }
            if (data.pomodoros !== undefined) {
                document.querySelector('#card-pomodoros .stat-value').textContent = data.pomodoros;
            }
            if (data.focusMinutes !== undefined) {
                document.querySelector('#card-minutes .stat-value').textContent = data.focusMinutes;
            }
            if (data.blocked !== undefined) {
                document.querySelector('#card-blocked .stat-value').textContent = data.blocked;
            }
        };
    </script>
</body>

</html>
